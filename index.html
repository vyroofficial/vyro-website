
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VYRO Official - Feel The Bass</title>

<meta name="description" content="VYRO Speaker Repair and Bass Booster Speakers">
<meta name="keywords" content="VYRO speaker, bass booster, speaker repair">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:white;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
box-shadow:0 0 15px #8000ff;
}

.logo{
font-size:24px;
font-weight:bold;
color:#00ffcc;
cursor:pointer;
}

.search{
padding:8px;
border-radius:20px;
border:none;
width:40%;
}

.cart-btn{
background:#00ffcc;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.categories{
display:flex;
overflow-x:auto;
background:#1a1a22;
padding:10px;
}

.categories div{
margin-right:10px;
padding:8px 15px;
background:#8000ff;
border-radius:20px;
cursor:pointer;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1a1a22;
width:230px;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px #8000ff55;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:18px;
margin-top:5px;
}

.sale{
color:#00ffcc;
font-weight:bold;
}

.add-btn{
background:#00ffcc;
border:none;
padding:10px;
width:100%;
border-radius:20px;
cursor:pointer;
margin-top:8px;
}

.cart-page{
display:none;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
background:#1a1a22;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.cart-item img{
width:60px;
margin-right:10px;
border-radius:6px;
}

.qty button{
background:#8000ff;
border:none;
color:white;
padding:4px 8px;
margin:3px;
}

.checkout{
background:#00ffcc;
color:black;
padding:12px;
border:none;
border-radius:20px;
width:100%;
cursor:pointer;
}

.repair{
background:#111;
padding:60px 20px;
text-align:center;
}

footer{
background:#111;
text-align:center;
padding:20px;
margin-top:30px;
}

.admin{
display:none;
background:#1a1a22;
padding:20px;
}

input{
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<header>

<div class="logo" onclick="logoClick()">VYRO</div>

<input class="search" placeholder="Search speaker...">

<button class="cart-btn" onclick="openCart()">Cart (<span id="count">0</span>)</button>

</header>


<div class="categories">
<div>Portable</div>
<div>Bluetooth</div>
<div>Bass</div>
<div>Party</div>
<div>Repair</div>
</div>


<div id="home">

<div class="products" id="products">

</div>

<div class="repair">

<h2>Upgrade Your Speaker</h2>

<p>Old Speaker Repair (Best Quality)</p>
<p>Old Speaker Modify (Best Quality)</p>
<p>Your Trust Is Our Power</p>

<button onclick="contact()">Repair Now</button>

</div>

</div>


<div class="cart-page" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>


<div class="admin" id="admin">

<h2>Owner Admin Panel</h2>

<input id="pname" placeholder="Product Name">

<input id="pprice" placeholder="Price">

<input id="psale" placeholder="Sale Price">

<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>


<footer>

<p>Feel The Bass. Own The Power.</p>
<p>Made In India 🇮🇳</p>

</footer>


<script>

let products=[
{
name:"Portable Speaker",
price:500,
sale:399,
img:"https://images.unsplash.com/photo-1585386959984-a4155228e89d"
},
{
name:"Bass Booster",
price:700,
sale:599,
img:"https://images.unsplash.com/photo-1518441902117-0f66e3e00f12"
}
];

let cart=[];

function loadProducts(){

let html="";

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">

<strike>₹${p.price}</strike>

<span class="sale">₹${p.sale}</span>

</div>

<button class="add-btn" onclick="addCart(${i})">Add To Cart</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

loadProducts();


function addCart(i){

cart.push({...products[i],qty:1});

document.getElementById("count").innerText=cart.length;

alert("Added To Cart");

}


function openCart(){

home.style.display="none";

cartDiv=document.getElementById("cart");

cartDiv.style.display="block";

renderCart();

}


function renderCart(){

let html="";

let total=0;

cart.forEach((item,i)=>{

total+=item.sale*item.qty;

html+=`

<div class="cart-item">

<img src="${item.img}">

<div>

${item.name}<br>

₹${item.sale}

</div>

<div class="qty">

<button onclick="dec(${i})">-</button>

${item.qty}

<button onclick="inc(${i})">+</button>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerText=total;

}


function inc(i){

cart[i].qty++;

renderCart();

}

function dec(i){

if(cart[i].qty>1){

cart[i].qty--;

renderCart();

}

}


function checkout(){

let msg="NEW ORDER%0A";

cart.forEach(i=>{

msg+=i.name+" x"+i.qty+"%0A";

});

window.open("https://wa.me/919610651006?text="+msg);

}


function contact(){

window.open("https://wa.me/919610651006");

}


let click=0;

function logoClick(){

click++;

if(click==8){

let pass=prompt("Owner Password");

if(pass=="vyro123"){

document.getElementById("admin").style.display="block";

}

}

}


function addProduct(){

let name=document.getElementById("pname").value;

let price=document.getElementById("pprice").value;

let sale=document.getElementById("psale").value;

let img=document.getElementById("pimg").value;

products.push({name,price,sale,img});

loadProducts();

alert("Product Added");

}

</script>

</body>
  </html>

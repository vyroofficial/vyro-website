<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VYRO Official</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

.section{
padding:20px;
}

.horizontal-scroll{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 0;
}

.cat-box{
min-width:160px;
background:#1c1c1c;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.cat-box:hover{
background:#ff6600;
}

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.product{
background:#1c1c1c;
padding:15px;
width:220px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

#cart{
display:none;
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:12px;
}

#checkout{
display:none;
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
padding:8px;
margin:6px 0;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<header>VYRO OFFICIAL STORE</header>

<div class="section">
<h2>🔥 Speaker Categories</h2>
<div id="categories" class="horizontal-scroll"></div>
</div>

<div class="section">
<h2>🎵 Latest Speakers</h2>
<div id="products" class="products"></div>
<div style="text-align:center;margin-top:15px;">
<button onclick="filterCategory('all')">View All</button>
</div>
</div>

<div class="section">
<h2>🛠 Repair Your Speaker</h2>
<p>Send your speaker for professional repair service.</p>
<button onclick="addRepair()">Request Repair</button>
</div>

<div id="cart">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<p><b>Total ₹ <span id="total">0</span></b></p>
<button onclick="showCheckout()">Checkout</button>
</div>

<div id="checkout">
<h2>Checkout Details</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="tel" id="phone" placeholder="Phone">
<input type="email" id="email" placeholder="Email">
<textarea id="address" placeholder="Full Address"></textarea>
<input type="text" id="city" placeholder="City">
<input type="text" id="state" placeholder="State">
<input type="text" id="pincode" placeholder="PIN Code">
<button onclick="placeOrder()">Place Order</button>
</div>

<script>

let cart=[];
let allProducts=[];

fetch("https://opensheet.elk.sh/15oEk3CEYMnkheDPxwt1OtC7wNf_-6Mv11-R99x_y9kk/Sheet1")
.then(res=>res.json())
.then(data=>{
allProducts=data;
createCategories(data);
showProducts(data.slice(0,4)); // only first 4 show
});

function createCategories(data){
let cats=[...new Set(data.map(p=>p.category))];
let html="";
cats.forEach(c=>{
html+=`<div class="cat-box" onclick="filterCategory('${c}')">${c}</div>`;
});
document.getElementById("categories").innerHTML=html;
}

function filterCategory(cat){
if(cat==="all"){ showProducts(allProducts); }
else{
let filtered=allProducts.filter(p=>p.category===cat);
showProducts(filtered);
}
}

function showProducts(data){
let html="";
data.forEach(p=>{
html+=`
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>₹ ${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function addToCart(name,price){
cart.push({name,price});
document.getElementById("cart").style.display="block";
updateCart();
}

function addRepair(){
cart.push({name:"Speaker Repair Service",price:0});
document.getElementById("cart").style.display="block";
updateCart();
}

function updateCart(){
let html="";
let total=0;
cart.forEach(i=>{
html+=`<p>${i.name} - ₹${i.price}</p>`;
total+=Number(i.price);
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function showCheckout(){
document.getElementById("checkout").style.display="block";
window.scrollTo(0,document.body.scrollHeight);
}

function placeOrder(){

let total=document.getElementById("total").innerText;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;
let city=document.getElementById("city").value;
let state=document.getElementById("state").value;
let pincode=document.getElementById("pincode").value;

let items="";
cart.forEach(i=>{
items+=i.name+" - ₹"+i.price+"%0A";
});

let msg=
"🟢 NEW ORDER - VYRO%0A%0A"+
"Products:%0A"+items+
"%0ATotal: ₹"+total+
"%0A%0AName: "+name+
"%0APhone: "+phone+
"%0AEmail: "+email+
"%0A%0AAddress:%0A"+address+
"%0A"+city+", "+state+
"%0APIN: "+pincode;

window.open("https://wa.me/919610651006?text="+msg);

}

</script>

</body>
                                           </html>

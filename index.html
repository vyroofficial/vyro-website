<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VYRO Official</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:white;
}

/* HEADER */

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px purple;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ffc3;
cursor:pointer;
}

.cart-btn{
background:#00ffc3;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* CATEGORY */

.categories{
display:flex;
overflow-x:auto;
background:#1a1a22;
padding:10px;
}

.categories div{
background:purple;
padding:8px 15px;
margin-right:10px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1a1a22;
width:220px;
margin:10px;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

.add{
background:#00ffc3;
color:black;
border:none;
padding:8px;
border-radius:20px;
width:100%;
cursor:pointer;
}

/* CART */

.cart-page{
display:none;
padding:20px;
}

.cart-item{
background:#1a1a22;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.checkout{
background:#00ffc3;
color:black;
border:none;
padding:12px;
width:100%;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

/* FORM */

.form{
display:none;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

/* REPAIR */

.repair{
text-align:center;
padding:50px 20px;
background:#111;
}

.repair button{
background:purple;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#111;
}

</style>
</head>

<body>

<header>

<div class="logo" onclick="ownerClick()">VYRO 🇮🇳</div>

<button class="cart-btn" onclick="showCart()">
Cart (<span id="count">0</span>)
</button>

</header>


<div id="home">

<div class="categories">

<div>Portable</div>
<div>Bass</div>
<div>Party</div>
<div>Bluetooth</div>
<div>Home Theatre</div>

</div>


<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1585386959984-a4155228e89d">

<h3>Portable Speaker</h3>

<p>₹300</p>

<button class="add" onclick="addCart('Portable Speaker',300)">Add</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1608043152269-423dbba4e7e1">

<h3>Home Theatre</h3>

<p>₹700</p>

<button class="add" onclick="addCart('Home Theatre',700)">Add</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1518441902117-0f66e3e00f12">

<h3>Bass Booster</h3>

<p>₹500</p>

<button class="add" onclick="addCart('Bass Booster',500)">Add</button>

</div>

</div>


<div class="repair">

<h2>Speaker Repair Service</h2>

<p>Old Speaker Repair (Best Quality)</p>

<p>Old Speaker Modify (Best Quality)</p>

<p>Your Trust Is Our Power</p>

<br>

<button onclick="contact()">Repair My Speaker</button>

</div>

</div>


<div id="cart" class="cart-page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

<br><br>

<button onclick="backHome()">Back</button>

</div>


<div id="form" class="form">

<h2>Delivery Address</h2>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone">

<input id="pincode" placeholder="Pincode">

<textarea id="address" placeholder="Full Address"></textarea>

<button class="checkout" onclick="sendOrder()">Place Order</button>

</div>


<footer>

<p>Feel The Bass • VYRO</p>

</footer>


<script>

/* CART SYSTEM */

let cart=[];

function addCart(name,price){

cart.push({name,price});

document.getElementById("count").innerText=cart.length;

alert("Added To Cart");

}

function showCart(){

home.style.display="none";

cart.style.display="block";

renderCart();

}

function backHome(){

home.style.display="block";

cart.style.display="none";

}

function renderCart(){

let html="";

let total=0;

cart.forEach((item,i)=>{

html+=`

<div class="cart-item">

${item.name} - ₹${item.price}

<button onclick="removeItem(${i})">Remove</button>

</div>

`;

total+=item.price;

});

cartItems.innerHTML=html;

document.getElementById("total").innerText=total;

}

function removeItem(i){

cart.splice(i,1);

renderCart();

count.innerText=cart.length;

}

/* CHECKOUT */

function checkout(){

cart.style.display="none";

form.style.display="block";

}

function sendOrder(){

let name=name.value;

let phone=phone.value;

let pin=pincode.value;

let addressText=address.value;

let msg="NEW ORDER %0A";

cart.forEach(p=>{

msg+=p.name+" ₹"+p.price+"%0A";

});

msg+="%0AName:"+name;

msg+="%0APhone:"+phone;

msg+="%0APincode:"+pin;

msg+="%0AAddress:"+addressText;

window.open("https://wa.me/919610651006?text="+msg);

}

/* REPAIR */

function contact(){

window.open("https://wa.me/919610651006");

}

/* OWNER LOGIN */

let clickCount=0;

function ownerClick(){

clickCount++;

if(clickCount==8){

let pass=prompt("Owner Password");

if(pass=="vyro123"){

alert("Owner Login Success");

window.open("admin.html");

}

else{

alert("Wrong Password");

}

clickCount=0;

}

}

</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VYRO Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
cursor:pointer;
color:#00e0ff;
}

.search{
width:60%;
padding:8px;
border-radius:5px;
border:none;
}

.category{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
gap:20px;
}

.category div{
min-width:90px;
text-align:center;
font-size:13px;
}

.banner{
background:linear-gradient(45deg,#00e0ff,#8a2be2);
color:white;
padding:40px;
text-align:center;
font-size:22px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#00b300;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:red;
font-size:12px;
}

button{
background:#00e0ff;
border:none;
padding:8px;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

.cartbtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px;
border-radius:50%;
}

#cart{
display:none;
position:fixed;
top:0;
right:0;
background:white;
width:100%;
height:100%;
overflow:auto;
padding:20px;
}

.admin{
display:none;
position:fixed;
top:0;
left:0;
background:white;
width:100%;
height:100%;
overflow:auto;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

</style>
</head>

<body>

<header>
<div class="logo" onclick="adminClick()">VYRO</div>
<input class="search" placeholder="Search products..." onkeyup="searchProduct(this.value)">
</header>

<div class="category">
<div>Earbuds</div>
<div>Headphones</div>
<div>Speakers</div>
<div>Smart Watch</div>
<div>Power Bank</div>
<div>Sound Bar</div>
</div>

<div class="banner">
🔥 Splash Sale  
<br>
UP TO 70% OFF
</div>

<div class="products" id="products"></div>

<div class="cartbtn" onclick="openCart()">🛒</div>

<div id="cart">
<h2>Cart</h2>
<div id="cartItems"></div>

<h3>Checkout</h3>

<input placeholder="First Name">
<input placeholder="Last Name">
<input placeholder="Address">
<input placeholder="State">
<input placeholder="Pincode">
<input placeholder="Phone">

<button onclick="alert('Order Sent!')">Checkout</button>

<br><br>
<button onclick="closeCart()">Close</button>
</div>

<div class="admin" id="admin">
<h2>Owner Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pimg" placeholder="Image URL">
<input id="pprice" placeholder="Price">
<input id="psale" placeholder="Sale Price">

<button onclick="addProduct()">Add Product</button>
<button onclick="closeAdmin()">Close</button>

</div>

<script>

let products=[
{name:"Earbuds X1",img:"https://i.imgur.com/8Km9tLL.jpg",price:999,sale:699},
{name:"Speaker Boom",img:"https://i.imgur.com/4YQZ1Zy.jpg",price:1999,sale:1299},
{name:"Smart Watch",img:"https://i.imgur.com/Qo9K6mF.jpg",price:2999,sale:1999},
{name:"Headphones",img:"https://i.imgur.com/YR6K7bG.jpg",price:1499,sale:999}
];

let cart=[];

function showProducts(list=products){

let html="";

list.forEach((p,i)=>{

html+=`

<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>

<div class="old">₹${p.price}</div>
<div class="price">₹${p.sale}</div>

<button onclick="addCart(${i})">Add to Cart</button>
</div>

`;

});

document.getElementById("products").innerHTML=html;

}

showProducts();

function addCart(i){
cart.push(products[i]);
alert("Added to cart");
}

function openCart(){

let html="";

cart.forEach(p=>{
html+=`
<div>
<img src="${p.img}" width="50">
${p.name} - ₹${p.sale}
</div>
`;
});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("cart").style.display="block";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function searchProduct(v){

let f=products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase()));

showProducts(f);

}

let clickCount=0;

function adminClick(){

clickCount++;

if(clickCount==8){

let pass=prompt("Owner Password");

if(pass=="vyroowner"){
document.getElementById("admin").style.display="block";
}

clickCount=0;

}

}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

function addProduct(){

let n=document.getElementById("pname").value;
let i=document.getElementById("pimg").value;
let pr=document.getElementById("pprice").value;
let s=document.getElementById("psale").value;

products.push({name:n,img:i,price:pr,sale:s});

showProducts();

alert("Product Added");

}

</script>

</body>
  </html>

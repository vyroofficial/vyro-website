<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VYRO - Feel The Bass</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:white;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px #8000ff;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ffcc;
cursor:pointer;
}

.cart-btn{
background:#00ffcc;
color:black;
padding:8px 15px;
border:none;
border-radius:20px;
font-weight:bold;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1a1a22;
width:220px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #8000ff55;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.add-btn{
background:#00ffcc;
color:black;
border:none;
padding:8px;
border-radius:20px;
margin-top:8px;
width:100%;
font-weight:bold;
cursor:pointer;
}

.sale{
color:red;
font-weight:bold;
}

.cart-page{
display:none;
padding:20px;
}

.cart-item{
background:#1a1a22;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.checkout{
background:#00ffcc;
color:black;
padding:12px;
border:none;
border-radius:25px;
width:100%;
font-weight:bold;
}

.admin{
display:none;
padding:20px;
background:#111;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo" onclick="secretClick()">VYRO 🇮🇳</div>

<button class="cart-btn" onclick="showCart()">Cart (<span id="count">0</span>)</button>

</header>


<div id="home">

<div class="products" id="productList"></div>

</div>


<div id="cart" class="cart-page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>


<div id="form" class="cart-page">

<h2>Delivery Details</h2>

<input id="name" placeholder="First Name">

<input id="lastname" placeholder="Last Name">

<input id="phone" placeholder="Phone Number">

<input id="state" placeholder="State">

<input id="pincode" placeholder="Pincode">

<input id="address" placeholder="Full Address">

<button class="checkout" onclick="sendOrder()">Place Order</button>

</div>


<div id="admin" class="admin">

<h2>Owner Admin Panel</h2>

<input id="pname" placeholder="Product Name">

<input id="pprice" placeholder="Price">

<input id="pimg" placeholder="Image URL">

<input id="psale" placeholder="Sale Tag (optional)">

<button onclick="addProduct()">Add Product</button>

</div>


<script>

let products=[
{name:"Portable Speaker",price:300,img:"https://images.unsplash.com/photo-1585386959984-a4155228e89d",sale:""},
{name:"Bass Booster",price:500,img:"https://images.unsplash.com/photo-1518441902117-0f66e3e00f12",sale:"SALE"},
{name:"Home Theatre",price:700,img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1",sale:""}
]

let cart=[]

function loadProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<p class="sale">${p.sale}</p>

<button class="add-btn" onclick="addCart(${i})">Add To Cart</button>

<button onclick="deleteProduct(${i})">Delete</button>

</div>

`

})

document.getElementById("productList").innerHTML=html

}

loadProducts()


function addCart(i){

cart.push(products[i])

count.innerText=cart.length

}


function showCart(){

home.style.display="none"

cart.style.display="block"

renderCart()

}


function renderCart(){

let html=""

let total=0

cart.forEach((p,i)=>{

html+=`

<div class="cart-item">

<img src="${p.img}" width="60">

${p.name} ₹${p.price}

<button onclick="removeItem(${i})">Remove</button>

</div>

`

total+=p.price

})

cartItems.innerHTML=html

total.innerText=total

}


function removeItem(i){

cart.splice(i,1)

renderCart()

count.innerText=cart.length

}


function checkout(){

cart.style.display="none"

form.style.display="block"

}


function sendOrder(){

let msg="NEW ORDER %0A"

cart.forEach(p=>{

msg+=p.name+" ₹"+p.price+"%0A"

})

msg+="%0AName:"+name.value

msg+="%0APhone:"+phone.value

msg+="%0AAddress:"+address.value

window.open("https://wa.me/919610651006?text="+msg)

}


function addProduct(){

let p={

name:pname.value,

price:pprice.value,

img:pimg.value,

sale:psale.value

}

products.push(p)

loadProducts()

}


function deleteProduct(i){

products.splice(i,1)

loadProducts()

}


let clickCount=0

function secretClick(){

clickCount++

if(clickCount==5){

let pass=prompt("Enter Owner Password")

if(pass=="vyro123"){

admin.style.display="block"

}else{

alert("Wrong Password")

}

clickCount=0

}

}

</script>

</body>

  </html>

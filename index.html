<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VYRO Store</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.search{
padding:8px;
width:40%;
border-radius:5px;
border:none;
}

.categories{
display:flex;
overflow:auto;
background:white;
padding:10px;
}

.cat{
text-align:center;
margin:10px;
font-size:13px;
}

.cat img{
width:60px;
height:60px;
border-radius:50%;
}

.banner{
background:linear-gradient(45deg,purple,black);
color:white;
padding:40px;
text-align:center;
}

.banner button{
padding:10px 20px;
background:red;
border:none;
color:white;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px #ccc;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:red;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
}

button{
padding:8px;
border:none;
background:black;
color:white;
border-radius:5px;
margin-top:5px;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ccc;
padding:10px;
display:flex;
justify-content:space-between;
}

.admin{
display:none;
position:fixed;
top:10%;
left:10%;
right:10%;
background:white;
padding:20px;
box-shadow:0 0 10px black;
}

input{
padding:8px;
margin:5px;
width:90%;
}

</style>
</head>

<body>

<header>

<div class="logo" id="logo">VYRO</div>

<input class="search" placeholder="Search product">

<div onclick="openCart()">🛒</div>

</header>


<div class="categories">

<div class="cat">
<img src="https://i.imgur.com/kX4Y4Qp.png">
<p>Earbuds</p>
</div>

<div class="cat">
<img src="https://i.imgur.com/7V8sYdB.png">
<p>Headphones</p>
</div>

<div class="cat">
<img src="https://i.imgur.com/ZV5sP7E.png">
<p>Speakers</p>
</div>

<div class="cat">
<img src="https://i.imgur.com/0X8Jq9p.png">
<p>Smartwatch</p>
</div>

</div>


<div class="banner">

<h1>VYRO SPLASH SALE</h1>
<h2>UPTO 80% OFF</h2>
<button>Shop Now</button>

</div>


<div class="products" id="products"></div>


<div class="cart">

<div>Total: ₹<span id="total">0</span></div>

<button onclick="checkout()">Checkout</button>

</div>



<div class="admin" id="admin">

<h2>Owner Admin Panel</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="sale" placeholder="Sale Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>



<script>

let clickCount=0

document.getElementById("logo").onclick=function(){

clickCount++

if(clickCount==8){

let pass=prompt("Owner Password")

if(pass=="vyro123"){

document.getElementById("admin").style.display="block"

}

}

}


let products=[
{
name:"VYRO Earbuds",
price:999,
sale:699,
image:"https://i.imgur.com/ZV5sP7E.png"
}
]

let cart=[]


function showProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p class="old">₹${p.price}</p>

<p class="price">₹${p.sale}</p>

<button onclick="addCart(${i})">Add Cart</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showProducts()



function addProduct(){

let n=document.getElementById("name").value
let p=document.getElementById("price").value
let s=document.getElementById("sale").value
let i=document.getElementById("image").value

products.push({
name:n,
price:p,
sale:s,
image:i
})

showProducts()

}



function addCart(i){

cart.push(products[i])

calc()

}


function calc(){

let t=0

cart.forEach(c=>{

t+=Number(c.sale)

})

document.getElementById("total").innerText=t

}


function checkout(){

let name=prompt("Name")
let phone=prompt("Phone")
let address=prompt("Address")

let msg="Order:%0A"

cart.forEach(c=>{

msg+=c.name+" - ₹"+c.sale+"%0A"

})

msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Address:"+address

window.open("https://wa.me/91XXXXXXXXXX?text="+msg)

}

</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VYRO Official</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0f2c;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
color:#00aaff;
cursor:pointer;
}

.cart-btn{
background:#00aaff;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
}

.categories{
display:flex;
overflow-x:auto;
background:#151b40;
padding:10px;
}

.categories div{
margin-right:10px;
background:#00aaff;
padding:8px 15px;
border-radius:20px;
white-space:nowrap;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#151b40;
width:220px;
margin:10px;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#00ffcc;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:#aaa;
}

button{
cursor:pointer;
}

.add{
width:100%;
background:#00aaff;
border:none;
padding:10px;
border-radius:20px;
margin-top:5px;
}

.cart-page{
display:none;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
background:#151b40;
margin:10px 0;
padding:10px;
border-radius:10px;
}

.qty button{
background:#00aaff;
border:none;
padding:5px 10px;
}

.checkout{
width:100%;
padding:15px;
background:#00aaff;
border:none;
border-radius:25px;
font-weight:bold;
}

.form{
display:none;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

.admin{
display:none;
padding:20px;
background:#111;
}

</style>

</head>

<body>

<header>

<div class="logo" onclick="logoClick()">VYRO</div>

<button class="cart-btn" onclick="openCart()">

Cart (<span id="count">0</span>)

</button>

</header>

<div class="search">

<input placeholder="Search VYRO Speakers">

</div>

<div class="categories">

<div>Bluetooth</div>
<div>Portable</div>
<div>Party</div>
<div>Bass Boost</div>
<div>Home Theatre</div>

</div>

<div id="home">

<div class="products" id="products"></div>

</div>

<div id="cartPage" class="cart-page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

<div id="form" class="form">

<h2>Delivery Address</h2>

<input id="fname" placeholder="First Name">

<input id="lname" placeholder="Last Name">

<input id="address" placeholder="Address">

<input id="state" placeholder="State">

<input id="pin" placeholder="Pincode">

<input id="phone" placeholder="Phone Number">

<button class="checkout" onclick="sendOrder()">

Place Order

</button>

</div>

<div id="admin" class="admin">

<h2>Owner Admin Panel</h2>

<input id="pname" placeholder="Product Name">

<input id="pprice" placeholder="Price">

<input id="psale" placeholder="Sale Price">

<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script>

let products=[
{
name:"VYRO Portable Speaker",
price:999,
sale:699,
img:"https://images.unsplash.com/photo-1585386959984-a4155228e89d"
},
{
name:"VYRO Bass Speaker",
price:1499,
sale:999,
img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1"
}
];

let cart=[];

function renderProducts(){

let html="";

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p class="old">₹${p.price}</p>

<p class="price">₹${p.sale}</p>

<button class="add" onclick="addCart(${i})">

Add To Cart

</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

renderProducts();

function addCart(i){

cart.push({...products[i],qty:1});

count.innerText=cart.length;

}

function openCart(){

home.style.display="none";

cartPage.style.display="block";

renderCart();

}

function renderCart(){

let html="";

let total=0;

cart.forEach((p,i)=>{

html+=`

<div class="cart-item">

<img src="${p.img}" width="50">

${p.name}

<div class="qty">

<button onclick="dec(${i})">-</button>

${p.qty}

<button onclick="inc(${i})">+</button>

</div>

₹${p.sale*p.qty}

</div>

`;

total+=p.sale*p.qty;

});

cartItems.innerHTML=html;

total.innerText=total;

}

function inc(i){

cart[i].qty++;

renderCart();

}

function dec(i){

if(cart[i].qty>1) cart[i].qty--;

renderCart();

}

function checkout(){

cartPage.style.display="none";

form.style.display="block";

}

function sendOrder(){

let msg="New Order:%0A";

cart.forEach(p=>{

msg+=p.name+" x"+p.qty+" ₹"+p.sale+"%0A";

});

msg+="Name:"+fname.value+" "+lname.value;

msg+="%0APhone:"+phone.value;

msg+="%0AAddress:"+address.value;

msg+="%0AState:"+state.value;

msg+="%0APin:"+pin.value;

window.open("https://wa.me/919610651006?text="+msg);

}

let click=0;

function logoClick(){

click++;

if(click==8){

let pass=prompt("Enter Owner Password");

if(pass=="vyro123"){

admin.style.display="block";

}

}

}

function addProduct(){

products.push({

name:pname.value,

price:pprice.value,

sale:psale.value,

img:pimg.value

});

renderProducts();

}

</script>

</body>
  </html>

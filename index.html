<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYRO - FEEL THE POWER</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#090909;
color:#fff;
}

header{
background:linear-gradient(90deg,#000,#1a1a1a,#000);
padding:25px;
text-align:center;
border-bottom:2px solid gold;
box-shadow:0 0 25px gold;
}

.logo{
font-size:42px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

.tag{
color:#ddd;
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.card{
background:#141414;
padding:25px;
border-radius:20px;
margin-bottom:25px;
border:1px solid gold;
box-shadow:0 0 20px rgba(255,215,0,.25);
}

h2{
color:gold;
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#222;
color:#fff;
}

button{
background:gold;
color:black;
padding:15px 30px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ffdf00;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.toggle button{
margin-right:10px;
}

.payment{
text-align:center;
}

.upi{
font-size:18px;
color:#00ffcc;
}

.callbtn{
display:inline-block;
background:#00cc66;
padding:15px 22px;
border-radius:15px;
margin-top:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:18px;
border-radius:50%;
font-size:28px;
text-decoration:none;
box-shadow:0 0 20px #25D366;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<header>
<div class="logo">⚡ VYRO ⚡</div>
<div class="tag">FEEL THE POWER</div>
</header>

<div class="container">

<div class="card">

<h2>Repair / Upgrade Service</h2>

<div class="toggle">

<button onclick="setType('Repair')">Repair</button>

<button onclick="setType('Upgrade')">Upgrade</button>

<button onclick="setType('Repair + Upgrade')">Both</button>

</div>

<br>

<input type="text" id="serviceType" placeholder="Selected Service">

</div>

<div class="card">

<h2>Personal Details</h2>

<div class="grid">

<input id="name" type="text" placeholder="Full Name">

<input id="phone" type="text" placeholder="Mobile Number">

<input id="city" type="text" placeholder="City / Village">

<input id="pin" type="text" placeholder="PIN Code">

</div>

<textarea id="address" placeholder="Full Address"></textarea>

</div>

<div class="card">

<h2>Device Details</h2>

<select id="device">

<option>Speaker</option>
<option>Torch</option>
<option>RC Car</option>
<option>Remote Control</option>
<option>DC Fan</option>
<option>Other</option>

</select>

<input id="brand" type="text" placeholder="Brand Name">

<textarea id="problem" placeholder="Describe Problem / Upgrade Requirement"></textarea>

</div>

<div class="card">

<h2>Pickup Details</h2>

<input id="pickup" type="text" placeholder="Pickup Address">

<select id="pickupneed">

<option>Pickup Required</option>
<option>Self Delivery</option>

</select>

</div>

<div class="card payment">

<h2>₹50 Verification / Pickup Fee</h2>

<p class="upi">UPI: 9610651006-2@ybl</p>

<p>PhonePe Payment Available</p>

<input id="utr" type="text" placeholder="Enter UTR / Transaction ID">

<input type="file">

<a class="callbtn" href="tel:+919610651006">
📞 Call For Trust / More Info
</a>

</div>

<div class="card">

<h2>Submit Form</h2>

<button onclick="sendWhatsApp()">
Submit To WhatsApp
</button>

</div>

</div>

<a class="whatsapp"
href="https://wa.me/919610651006"
target="_blank">
💬
</a>

<script>

function setType(type){
document.getElementById("serviceType").value=type;
}

function sendWhatsApp(){

let name=document.getElementById("name").value;

let phone=document.getElementById("phone").value;

let city=document.getElementById("city").value;

let pin=document.getElementById("pin").value;

let address=document.getElementById("address").value;

let service=document.getElementById("serviceType").value;

let device=document.getElementById("device").value;

let brand=document.getElementById("brand").value;

let problem=document.getElementById("problem").value;

let pickup=document.getElementById("pickup").value;

let pickupneed=document.getElementById("pickupneed").value;

let utr=document.getElementById("utr").value;

let msg=
`⚡ VYRO NEW REQUEST ⚡

Service: ${service}

Name: ${name}

Phone: ${phone}

City: ${city}

PIN: ${pin}

Address: ${address}

Device: ${device}

Brand: ${brand}

Problem: ${problem}

Pickup: ${pickup}

Pickup Type: ${pickupneed}

UTR: ${utr}
`;

window.open(
"https://wa.me/919610651006?text="+encodeURIComponent(msg),
"_blank"
);

}

</script>

</body>
  </html>

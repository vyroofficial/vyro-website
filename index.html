<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VYRO Speaker Repair</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* Header */

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#logo{
font-size:24px;
font-weight:bold;
cursor:pointer;
}

#cartBtn{
background:#25D366;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

/* Categories */

.categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
}

.cat{
margin-right:15px;
padding:8px 15px;
background:#eee;
border-radius:20px;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.addBtn{
background:purple;
color:white;
border:none;
padding:8px 10px;
margin-top:8px;
cursor:pointer;
}

/* Cart */

#cartPage{
display:none;
padding:20px;
}

.cartItem{
display:flex;
align-items:center;
background:white;
margin-bottom:10px;
padding:10px;
border-radius:10px;
}

.cartItem img{
width:60px;
margin-right:10px;
}

.qty{
width:40px;
}

/* Checkout */

#checkout{
display:none;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

/* Admin Panel */

#admin{
display:none;
background:white;
padding:20px;
}

</style>
</head>

<body>

<header>
<div id="logo">VYRO</div>
<button id="cartBtn" onclick="openCart()">Cart</button>
</header>

<div class="categories">
<div class="cat">Bluetooth</div>
<div class="cat">DJ Speaker</div>
<div class="cat">Home Theatre</div>
<div class="cat">Repair</div>
</div>

<div class="products" id="productList"></div>

<!-- Cart Page -->

<div id="cartPage">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="openCheckout()">Checkout</button>
</div>

<!-- Checkout -->

<div id="checkout">
<h2>Delivery Address</h2>

<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="address" placeholder="Address">
<input id="state" placeholder="State">
<input id="pin" placeholder="Pincode">
<input id="phone" placeholder="Phone Number">

<button onclick="sendOrder()">Place Order</button>

</div>

<!-- Admin Panel -->

<div id="admin">
<h2>Owner Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script>

let products=[
{name:"Bluetooth Speaker",price:499,img:"https://i.imgur.com/8Km9tLL.jpg"},
{name:"DJ Speaker",price:999,img:"https://i.imgur.com/9Yj6F9b.jpg"},
{name:"Home Theatre",price:1499,img:"https://i.imgur.com/W1bX6zE.jpg"}
];

let cart=[];

/* Load Products */

function loadProducts(){

let html="";

products.forEach((p,i)=>{

html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button class="addBtn" onclick="addCart(${i})">Add to Cart</button>
</div>
`;

});

document.getElementById("productList").innerHTML=html;

}

loadProducts();

/* Cart */

function addCart(i){

cart.push(products[i]);

alert("Added to Cart");

}

function openCart(){

document.getElementById("cartPage").style.display="block";

let html="";
let total=0;

cart.forEach((p)=>{

html+=`
<div class="cartItem">
<img src="${p.img}">
<div>
${p.name}<br>
₹${p.price}
</div>
</div>
`;

total+=p.price;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;

}

/* Checkout */

function openCheckout(){

document.getElementById("checkout").style.display="block";

}

/* WhatsApp Order */

function sendOrder(){

let name=document.getElementById("fname").value;
let phone=document.getElementById("phone").value;

let msg="New Order %0AName:"+name+"%0APhone:"+phone;

window.open("https://wa.me/919610651006?text="+msg);

}

/* Admin Hidden */

let click=0;

document.getElementById("logo").onclick=function(){

click++;

if(click==8){

let pass=prompt("Owner Password");

if(pass=="1234"){

document.getElementById("admin").style.display="block";

}

}

}

/* Add Product */

function addProduct(){

let n=document.getElementById("pname").value;
let pr=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;

products.push({name:n,price:pr,img:img});

loadProducts();

alert("Product Added");

}

</script>

</body>
  </html>

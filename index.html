<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VYRO Official Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

#category-filter{
text-align:center;
padding:10px;
}

#category-filter button{
margin:5px;
padding:8px 15px;
background:#222;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

#product-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.product{
background:#1c1c1c;
padding:15px;
width:220px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

#cart-section{
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
padding:8px;
margin:6px 0;
border:none;
border-radius:6px;
}

#checkout-form{
display:none;
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:12px;
}
</style>
</head>

<body>

<header>VYRO OFFICIAL STORE</header>

<div id="category-filter"></div>
<div id="product-list"></div>

<div id="cart-section">
<h2>🛒 Cart</h2>
<div id="cart-items"></div>
<p><b>Total: ₹<span id="cart-total">0</span></b></p>
<button onclick="showCheckout()">Checkout</button>
</div>

<div id="checkout-form">
<h2>Checkout Details</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<input type="email" id="email" placeholder="Email" required>
<textarea id="address" placeholder="Full Address" required></textarea>
<input type="text" id="city" placeholder="City" required>
<input type="text" id="state" placeholder="State" required>
<input type="text" id="pincode" placeholder="PIN Code" required>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>

let cart = [];
let productsData = [];

fetch("https://opensheet.elk.sh/15oEk3CEYMnkheDPxwt1OtC7wNf_-6Mv11-R99x_y9kk/Sheet1")
.then(res => res.json())
.then(data => {
productsData = data;
renderCategories(data);
renderProducts(data);
});

function renderCategories(data){
let categories = [...new Set(data.map(p => p.category))];
let buttons = `<button onclick="filterCategory('all')">All</button>`;
categories.forEach(cat=>{
buttons += `<button onclick="filterCategory('${cat}')">${cat}</button>`;
});
document.getElementById("category-filter").innerHTML = buttons;
}

function filterCategory(category){
if(category === "all"){
renderProducts(productsData);
}else{
let filtered = productsData.filter(p => p.category === category);
renderProducts(filtered);
}
}

function renderProducts(data){
let output = "";
data.forEach(product=>{
output += `
<div class="product">
<img src="${product.image}">
<h3>${product.name}</h3>
<p>₹${product.price}</p>
<p>Stock: ${product.stock}</p>
<button onclick='addToCart("${product.name}", ${product.price})'>Add to Cart</button>
</div>
`;
});
document.getElementById("product-list").innerHTML = output;
}

function addToCart(name, price){
let existing = cart.find(item => item.name === name);
if(existing){
existing.qty += 1;
}else{
cart.push({name, price, qty:1});
}
updateCart();
}

function updateCart(){
let html = "";
let total = 0;

cart.forEach((item,index)=>{
html += `
<p>
${item.name} - ₹${item.price} x ${item.qty}
<button onclick="removeItem(${index})">❌</button>
</p>
`;
total += item.price * item.qty;
});

document.getElementById("cart-items").innerHTML = html;
document.getElementById("cart-total").innerText = total;
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function showCheckout(){
if(cart.length === 0){
alert("Cart is empty");
return;
}
document.getElementById("checkout-form").style.display = "block";
window.scrollTo(0, document.body.scrollHeight);
}

function placeOrder(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let address = document.getElementById("address").value;
let city = document.getElementById("city").value;
let state = document.getElementById("state").value;
let pincode = document.getElementById("pincode").value;

let total = document.getElementById("cart-total").innerText;

let productText = "";
cart.forEach(item=>{
productText += item.name + " x" + item.qty + " - ₹" + (item.price*item.qty) + "%0A";
});

let message =
"🟢 NEW ORDER - VYRO%0A%0A" +
"🛍 Products:%0A" + productText +
"%0A💰 Total: ₹" + total +
"%0A%0A👤 Name: " + name +
"%0A📞 Phone: " + phone +
"%0A📧 Email: " + email +
"%0A%0A🏠 Address:%0A" + address +
"%0A" + city + ", " + state +
"%0A PIN: " + pincode;

let url = "https://wa.me/919610651006?text=" + message;

window.open(url,"_blank");
}

</script>

</body>
  </html>
